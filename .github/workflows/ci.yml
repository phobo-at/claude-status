name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Security and tests (arm64)
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Static security policy
        run: ./Scripts/security-check.sh

      - name: Unit tests
        run: |
          xcodebuild \
            -project ClaudeStatus.xcodeproj \
            -scheme ClaudeStatus \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath /tmp/ClaudeStatusDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Unnotarized internal package
        run: ./Scripts/build-shareable.sh
